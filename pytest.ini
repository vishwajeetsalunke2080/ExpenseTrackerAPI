[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Custom markers
markers =
    property: Property-based tests using Hypothesis
    feature: Tests for specific features (use with feature name)

# Hypothesis settings
hypothesis_profile = default

[hypothesis]
max_examples = 25
deadline = None
